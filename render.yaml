# Render Blueprint
services:
  - type: web
    name: hafil-arcade
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Do NOT use gunicorn -k eventlet — Gunicorn 26 removed that worker.
    # flask-socketio + eventlet via `python app.py` is the supported path.
    startCommand: python app.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.8"
    healthCheckPath: /api/health
